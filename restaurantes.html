<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restaurantes</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background-image:url("fondo_menu.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

.btn-back{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 15px;
  background:rgba(0,0,0,0.7);
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

h1{
  text-align:center;
  padding:30px;
  font-size:3rem;
  background:linear-gradient(90deg,#fff,#38bdf8,#f97316);
  -webkit-background-clip:text;
  color:transparent;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:rgba(2,6,23,0.9);
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  margin-top:10px;
}

.info{
  font-size:14px;
  margin:5px 0;
}

.menu{
  background:rgba(0,0,0,0.4);
  padding:8px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
}

.review{
  margin-top:8px;
  font-size:13px;
  font-style:italic;
  color:#facc15;
}

.card iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  text-decoration:none;
  font-weight:bold;
}

.btn:hover{
  background:#f97316;
  color:white;
}
</style>
</head>

<body>

<a href="index.html" class="btn-back">⬅ Volver</a>
<h1>Restaurantes Premium</h1>

<div class="container">
<div class="grid">

<!-- RESTAURANTES 1 al 15 -->

<script>
const restaurantes = [
["Central","Perú","150","4.9","Degustación andina, mariscos frescos","Experiencia única","Central+Peru"],
["Noma","Dinamarca","300","4.8","Cocina nórdica, menú degustación","Innovación total","Noma"],
["Can Roca","España","200","4.9","Alta cocina catalana","Perfecto equilibrio","Can+Roca"],
["Osteria Francescana","Italia","250","4.9","Pasta gourmet","Elegancia italiana","Osteria+Francescana"],
["Mugaritz","España","220","4.7","Cocina experimental","Sorprendente","Mugaritz"],
["Mirazur","Francia","210","4.8","Mediterráneo","Vista increíble","Mirazur"],
["Arpège","Francia","180","4.7","Vegetales","Natural y fresco","Arpege"],
["Steirereck","Austria","190","4.6","Europeo moderno","Muy refinado","Steirereck"],
["Geranium","Dinamarca","280","4.9","Alta cocina","Arte culinario","Geranium"],
["Pujol","México","160","4.8","Mexicano gourmet","Sabores intensos","Pujol"],
["Quintonil","México","150","4.7","Moderno","Excelente servicio","Quintonil"],
["Azurmendi","España","180","4.8","Sostenible","Innovador","Azurmendi"],
["Blue Hill","USA","170","4.6","Orgánico","Muy natural","Blue+Hill"],
["Le Bernardin","USA","200","4.9","Mariscos","Alta calidad","Le+Bernardin"],
["Disfrutar","España","210","4.8","Creativo","Muy original","Disfrutar"]
];

document.write(restaurantes.map((r,i)=>`
<div class="card">
<img src="res${i+1}.jpg">
<h3>${r[0]}</h3>
<div class="info">📍 ${r[1]} | 💰 $${r[2]}</div>
<div class="info">⭐ ${r[3]} | ⏰ 13:00 - 22:00 | 📞 +000 000 000</div>
<p>Restaurante reconocido mundialmente.</p>

<div class="menu">🍽️ ${r[4]}</div>
<div class="review">💬 "${r[5]}"</div>

<iframe src="https://www.google.com/maps?q=${r[6]}&output=embed"></iframe>
<a class="btn" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${r[6]}">Ver en Google Maps</a>
</div>
`).join(""));
</script>

</div>
</div>

</body>
</html>
