<style>

*{

}

body{

}

/* CONTENEDOR PRINCIPAL */
.menu{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:40px;

  background-image:url("fondo_menu.jpg");
  background-size:cover;
  background-position:center;
  position:relative;
}

/* OSCURECER FONDO */
.menu::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

.menu *{
  position:relative;
  z-index:1;
}

/* BOTONES VERTICALES */
.nav-left{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* BOTONES PREMIUM */
.nav-left a{
  text-decoration:none;
  color:white;
  font-size:18px;

  padding:18px 25px;
  width:220px;
  text-align:center;

  border-radius:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:0 8px 20px rgba(0,0,0,0.6);

  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* EFECTO BRILLO */
.nav-left a::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  transition:0.5s;
}

.nav-left a:hover::before{
  left:100%;
}

/* HOVER */
.nav-left a:hover{
  transform:scale(1.05);
  background:rgba(56,189,248,0.3);
}

/* TÍTULO CENTRADO */
.nav-center{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

/* TÍTULO PRO */
.logo-text{
  font-size:3rem;
  font-weight:bold;

  background:linear-gradient(90deg,#ffffff,#38bdf8,#f97316);
  -webkit-background-clip:text;
  color:transparent;

  text-shadow:0 0 20px rgba(0,0,0,0.7);
}

/* LOGO GRANDE */
